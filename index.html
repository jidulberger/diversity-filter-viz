<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>When Does Diversity Help Quality?</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f3ed; color: #2a2a2a; }
  input[type=range] { height: 4px; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
<script type="text/babel" data-type="module">
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;
var useMemo = React.useMemo;

function seededRand(seed) {
  var s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

var N = 100;
var N_PATTERN = 22;
function makePool() {
  // Use separate random streams for talent vs group assignment
  // so group membership is truly independent of talent
  var rTalent = seededRand(42);
  var rGroup = seededRand(147);
  var rProxy = seededRand(137);
  // Generate talents first
  var talents = [];
  for (var i = 0; i < N; i++) {
    var t1 = rTalent(), t2 = rTalent();
    talents.push(Math.min(1, Math.max(0, t1 * 0.5 + t2 * 0.5)));
  }
  // Assign groups independently
  var groupAssign = [];
  for (var i = 0; i < N; i++) groupAssign.push(i < N_PATTERN ? "pattern" : "rest");
  for (var i = N - 1; i > 0; i--) {
    var j = Math.floor(rGroup() * (i + 1));
    var tmp = groupAssign[i]; groupAssign[i] = groupAssign[j]; groupAssign[j] = tmp;
  }
  var arr = [];
  for (var id = 0; id < N; id++) {
    var group = groupAssign[id];
    var talent = talents[id];
    // Graham's world: pattern group genuinely better, with real variance
    var grahamTalent;
    if (group === "pattern") {
      grahamTalent = Math.min(1, Math.max(0, 0.50 + talent * 0.5 + (rProxy() - 0.5) * 0.12));
    } else {
      grahamTalent = Math.min(1, Math.max(0, 0.05 + talent * 0.64 + (rProxy() - 0.5) * 0.10));
    }
    // Graham's signal: a noisy measurement of grahamTalent (good but not perfect)
    var grahamSignal = Math.min(1, Math.max(0, grahamTalent + (rProxy() - 0.5) * 0.28));
    // Proxy: equal accuracy for both groups, additive bias for pattern
    var proxyAccuracy = 0.35;
    var proxyBias = group === "pattern" ? 0.35 : 0;
    var proxy = Math.min(1, Math.max(0, proxyAccuracy * talent + (1 - proxyAccuracy) * rProxy() + proxyBias));
    var noise = rProxy();
    var jx = (rProxy() - 0.5) * 1.6;
    var jy = (rProxy() - 0.5) * 1.6;
    arr.push({ id: id, group: group, talent: talent, grahamTalent: grahamTalent, grahamSignal: grahamSignal, proxy: proxy, noise: noise, jx: jx, jy: jy });
  }
  return arr;
}
var POOL = makePool();

// Shuffled order for pre-filter display
var SHUFFLED = (function() {
  var r = seededRand(99);
  var indices = [];
  for (var i = 0; i < N; i++) indices.push(i);
  for (var i = N - 1; i > 0; i--) {
    var j = Math.floor(r() * (i + 1));
    var tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
  }
  return indices;
})();

function selectBlended(pool, signal, rate, divWeight) {
  var n = Math.floor(pool.length * rate);
  if (n < 1) n = 1;
  var pat = pool.filter(function(c) { return c.group === "pattern"; });
  var rest = pool.filter(function(c) { return c.group === "rest"; });
  var patSorted = pat.slice().sort(function(a, b) { return b[signal] - a[signal]; });
  var restSorted = rest.slice().sort(function(a, b) { return b[signal] - a[signal]; });
  var meritSorted = pool.slice().sort(function(a, b) { return b[signal] - a[signal]; });
  var meritRestCount = 0;
  for (var i = 0; i < n; i++) {
    if (meritSorted[i].group === "rest") meritRestCount++;
  }
  var propRestCount = Math.round(n * rest.length / pool.length);
  var blendedRestCount = Math.round(meritRestCount + divWeight * (propRestCount - meritRestCount));
  blendedRestCount = Math.max(0, Math.min(n, blendedRestCount));
  var blendedPatCount = n - blendedRestCount;
  blendedPatCount = Math.min(blendedPatCount, patSorted.length);
  blendedRestCount = Math.min(blendedRestCount, restSorted.length);
  if (blendedPatCount + blendedRestCount < n) {
    var diff = n - blendedPatCount - blendedRestCount;
    if (blendedPatCount < patSorted.length) {
      blendedPatCount = Math.min(patSorted.length, blendedPatCount + diff);
    } else {
      blendedRestCount = Math.min(restSorted.length, blendedRestCount + diff);
    }
  }
  var ids = new Set();
  for (var p = 0; p < blendedPatCount; p++) ids.add(patSorted[p].id);
  for (var r2 = 0; r2 < blendedRestCount; r2++) ids.add(restSorted[r2].id);
  return ids;
}

function topMissed(ids, pool, truthField, rate) {
  var nTop = Math.floor(pool.length * rate);
  var top = pool.slice().sort(function(a, b) { return b[truthField] - a[truthField]; }).slice(0, nTop);
  return top.filter(function(c) { return !ids.has(c.id); });
}

function sortedByTruth(pool, truthField) {
  return pool.slice().sort(function(a, b) { return b[truthField] - a[truthField]; });
}

var WORLDS = [
  {
    id: "graham",
    name: "Graham\u2019s World",
    signal: "grahamSignal",
    truth: "grahamTalent",
    subtitle: "Quality is roughly measurable. The pattern group \u2014 Ivy-educated, ex-FAANG, technical \u2014 genuinely has higher average ability in this world. Your filter works, imperfectly. This is the world Paul Graham\u2019s argument assumes you live in.",
  },
  {
    id: "biased",
    name: "Pattern-Match World",
    signal: "proxy",
    truth: "talent",
    subtitle: "Your filter has some real signal for everyone \u2014 but it\u2019s much better at reading pattern candidates (legible backgrounds, known reference points) than non-traditional ones (fewer anchors, more noise). On top of that, pattern candidates get a baseline bonus for looking the part. The filter works, unevenly.",
  },
  {
    id: "random",
    name: "Random Filter",
    signal: "noise",
    truth: "talent",
    subtitle: "Control group. Your filter is pure noise \u2014 zero correlation with talent. Neither the filter nor a diversity constraint does anything meaningful. This is what it looks like when there\u2019s no signal to correct or preserve.",
  },
];

function sketchCircle(ctx, cx, cy, r, jitterAmt) {
  var j = jitterAmt || 0.3;
  ctx.beginPath();
  for (var i = 0; i <= 24; i++) {
    var a = (i / 24) * Math.PI * 2;
    var rr = r + (Math.sin(a * 7.3 + cx) * r * j);
    var px = cx + Math.cos(a) * rr;
    var py = cy + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function sketchLine(ctx, x1, y1, x2, y2) {
  ctx.beginPath();
  for (var i = 0; i <= 8; i++) {
    var t = i / 8;
    var px = x1 + (x2 - x1) * t + (Math.sin(t * 13.7) * 0.8);
    var py = y1 + (y2 - y1) * t + (Math.cos(t * 11.3) * 0.8);
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
}

function TalentGrid(props) {
  var selected = props.selected;
  var truthField = props.truthField;
  var rate = props.rate;
  var filterAnim = props.filterAnim; // 0 = unfiltered, 1 = fully filtered
  var ref = useRef(null);
  var sorted = sortedByTruth(POOL, truthField);
  var nSelected = Math.floor(POOL.length * rate);
  var missed = topMissed(selected, POOL, truthField, rate);
  var missedIds = {};
  for (var m = 0; m < missed.length; m++) missedIds[missed[m].id] = true;

  // Build position maps: shuffled positions and sorted positions
  var sortedIdOrder = {};
  for (var si = 0; si < sorted.length; si++) sortedIdOrder[sorted[si].id] = si;
  var shuffledIdOrder = {};
  for (var shi = 0; shi < SHUFFLED.length; shi++) shuffledIdOrder[POOL[SHUFFLED[shi]].id] = shi;

  useEffect(function() {
    var el = ref.current;
    if (!el) return;
    var dpr = window.devicePixelRatio || 1;
    var W = props.width || 300;
    var cols = 10;
    var rows = Math.ceil(N / cols);
    var pad = 10;
    var gapX = (W - pad * 2) / cols;
    var gapY = gapX;
    var cutoffRow = Math.ceil(nSelected / cols);
    var gapSize = 14;
    var H = pad + rows * gapY + gapSize + 28;
    var dotR = gapX * 0.36;

    el.width = W * dpr;
    el.height = H * dpr;
    el.style.width = W + "px";
    el.style.height = H + "px";
    var ctx = el.getContext("2d");
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    // Cutoff line (only when filtered)
    if (filterAnim > 0.1) {
      var lineY = pad + cutoffRow * gapY + 2;
      ctx.globalAlpha = Math.min(1, (filterAnim - 0.5) * 2);
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.lineWidth = 1.2;
      sketchLine(ctx, pad - 2, lineY, W - pad + 2, lineY);
      ctx.stroke();
      ctx.fillStyle = "#888";
      ctx.font = "11px Caveat, cursive";
      ctx.textAlign = "right";
      ctx.fillText("top " + Math.round(rate * 100) + "% \u2191", W - pad + 2, lineY + 13);
      ctx.globalAlpha = 1;
    }

    for (var i = 0; i < POOL.length; i++) {
      var c = POOL[i];

      // Shuffled position
      var shIdx = shuffledIdOrder[c.id];
      var shCol = shIdx % cols;
      var shRow = Math.floor(shIdx / cols);
      var shX = pad + shCol * gapX + gapX / 2;
      var shY = pad + shRow * gapY + gapY / 2;

      // Sorted position
      var soIdx = sortedIdOrder[c.id];
      var soCol = soIdx % cols;
      var soRow = Math.floor(soIdx / cols);
      var soExtraY = (soRow >= cutoffRow) ? gapSize + 14 : 0;
      var soX = pad + soCol * gapX + gapX / 2;
      var soY = pad + soRow * gapY + gapY / 2 + soExtraY;

      // Interpolate position
      var ease = filterAnim < 1 ? (filterAnim * filterAnim * (3 - 2 * filterAnim)) : 1; // smoothstep
      var cx = shX + (soX - shX) * ease + c.jx * ease;
      var cy = shY + (soY - shY) * ease + c.jy * ease;

      var isSelected = selected.has(c.id);
      var isMissed = missedIds[c.id];
      var isAboveCut = soIdx < nSelected;

      // Before filter applied: everyone looks the same
      var selectionAlpha = Math.max(0, Math.min(1, (filterAnim - 0.4) / 0.5));

      // All dots are full size. Group identity always visible.
      // Selected = filled solid. Not selected = outlined/hollow.
      var isFiltered = filterAnim > 0.4;
      var selAlpha = Math.max(0, Math.min(1, (filterAnim - 0.4) / 0.5));

      if (isMissed && isFiltered) {
        // Draw group shape (hollow) then red X on top
        sketchCircle(ctx, cx, cy, dotR, 0.12);
        if (c.group === "pattern") {
          ctx.strokeStyle = "rgba(40,116,166,0.5)";
        } else {
          ctx.strokeStyle = "rgba(42,42,42,0.35)";
        }
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Red X
        ctx.globalAlpha = selAlpha;
        ctx.beginPath();
        sketchLine(ctx, cx - dotR * 0.45, cy - dotR * 0.45, cx + dotR * 0.45, cy + dotR * 0.45);
        ctx.strokeStyle = "#c0392b";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        sketchLine(ctx, cx + dotR * 0.45, cy - dotR * 0.45, cx - dotR * 0.45, cy + dotR * 0.45);
        ctx.stroke();
        ctx.globalAlpha = 1;
      } else if (c.group === "pattern") {
        sketchCircle(ctx, cx, cy, dotR, 0.12);
        if (!isFiltered) {
          // Pre-filter: medium fill
          ctx.fillStyle = "rgba(40,116,166,0.45)";
          ctx.fill();
        } else if (isSelected) {
          // Selected: solid fill
          ctx.fillStyle = "#2874a6";
          ctx.fill();
          ctx.strokeStyle = "#1a5276";
          ctx.lineWidth = 1;
          ctx.stroke();
        } else {
          // Not selected: hollow outline
          ctx.strokeStyle = "rgba(40,116,166,0.45)";
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
        // Donut hole (always, to identify pattern)
        sketchCircle(ctx, cx, cy, dotR * 0.35, 0.15);
        ctx.fillStyle = "#f5f3ed";
        ctx.fill();
      } else {
        // Non-traditional
        sketchCircle(ctx, cx, cy, dotR, 0.15);
        if (!isFiltered) {
          // Pre-filter: medium fill
          ctx.fillStyle = "rgba(42,42,42,0.25)";
          ctx.fill();
        } else if (isSelected) {
          // Selected: solid fill
          ctx.fillStyle = "rgba(42,42,42,0.85)";
          ctx.fill();
        } else {
          // Not selected: hollow outline
          ctx.strokeStyle = "rgba(42,42,42,0.3)";
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }
    }
  }, [selected, missed.length, props.width, rate, filterAnim]);

  return React.createElement("canvas", { ref: ref, style: { display: "block" } });
}

// Breakeven chart model:
// - Equal evaluation accuracy for both groups
// - Bias is purely additive (baseline/prior, not eval ability)
// - Heavy-tailed talent: few stars, many mediocre
// - Pool exhaustion drives the diversity advantage
function makeProxy(pool, accuracy, biasMag, realEdge, seed) {
  var r = seededRand(seed);
  var result = [];
  for (var i = 0; i < pool.length; i++) {
    var c = pool[i];
    var trueTalent = Math.min(1, c.talent + (c.group === "pattern" ? realEdge : 0));
    // Bias fades slowly — unconscious anchoring persists even as evaluation improves
    var fakeBias = c.group === "pattern" ? biasMag * Math.pow(Math.max(0, 1 - accuracy), 0.3) : 0;
    var signal = accuracy * trueTalent + (1 - accuracy) * r() + fakeBias;
    result.push({ id: c.id, group: c.group, talent: trueTalent, proxy: signal });
  }
  return result;
}

function avgTalentOfSelected(pool, signal, rate, divWeight) {
  var n = Math.floor(pool.length * rate);
  if (n < 1) return 0;
  var pat = pool.filter(function(c) { return c.group === "pattern"; });
  var rest = pool.filter(function(c) { return c.group === "rest"; });
  var patSorted = pat.slice().sort(function(a, b) { return b[signal] - a[signal]; });
  var restSorted = rest.slice().sort(function(a, b) { return b[signal] - a[signal]; });
  var meritSorted = pool.slice().sort(function(a, b) { return b[signal] - a[signal]; });
  var meritRestCount = 0;
  for (var i = 0; i < n; i++) {
    if (meritSorted[i].group === "rest") meritRestCount++;
  }
  var propRestCount = Math.round(n * rest.length / pool.length);
  var blendedRestCount = Math.round(meritRestCount + divWeight * (propRestCount - meritRestCount));
  blendedRestCount = Math.max(0, Math.min(n, blendedRestCount));
  var blendedPatCount = n - blendedRestCount;
  blendedPatCount = Math.min(blendedPatCount, patSorted.length);
  blendedRestCount = Math.min(blendedRestCount, restSorted.length);
  var total = 0;
  var count = 0;
  for (var p = 0; p < blendedPatCount; p++) { total += patSorted[p].talent; count++; }
  for (var r2 = 0; r2 < blendedRestCount; r2++) { total += restSorted[r2].talent; count++; }
  return count > 0 ? total / count : 0;
}

// Precompute breakeven data (sweep accuracy 0-1)
var BREAKEVEN_STEPS = 40;

// Heavy-tailed talent: most people are mediocre, a few are exceptional.
// Uses a power-law-ish distribution — closer to how startup value is distributed.
function makeFreshPool(seed) {
  var r = seededRand(seed);
  var arr = [];
  for (var id = 0; id < 100; id++) {
    var group = r() < 0.22 ? "pattern" : "rest";
    // Power-law-ish: talent = r^0.5 gives right-skew (more mass at low end)
    // Then r^2 for the base gives very heavy tail: few stars, many mediocre
    var u = r();
    var talent = Math.pow(u, 2); // heavy tail: median ~0.25, most mediocre, few stars
    arr.push({ id: id, group: group, talent: talent });
  }
  return arr;
}

var ACC_MIN = -0.3, ACC_MAX = 1.0;
function computeBreakeven(rate, biasMag, realEdge) {
  var points = [];
  var nSeeds = 16;
  for (var step = 0; step <= BREAKEVEN_STEPS; step++) {
    var accuracy = ACC_MIN + (ACC_MAX - ACC_MIN) * step / BREAKEVEN_STEPS;
    var pureSum = 0, divSum = 0;
    for (var s = 0; s < nSeeds; s++) {
      var freshPool = makeFreshPool(300 + s * 7);
      var proxied = makeProxy(freshPool, accuracy, biasMag, realEdge, 500 + step * 100 + s);
      pureSum += avgTalentOfSelected(proxied, "proxy", rate, 0);
      divSum += avgTalentOfSelected(proxied, "proxy", rate, 1);
    }
    points.push({
      accuracy: accuracy,
      pure: pureSum / nSeeds,
      div: divSum / nSeeds,
    });
  }
  return points;
}

function BreakevenChart(props) {
  var points = props.points;
  var ref = useRef(null);

  useEffect(function() {
    var el = ref.current;
    if (!el) return;
    var dpr = window.devicePixelRatio || 1;
    var parentW = el.parentElement ? el.parentElement.offsetWidth : 600;
    var W = Math.min(680, Math.max(360, parentW));
    var H = Math.round(W * 0.5);
    el.width = W * dpr;
    el.height = H * dpr;
    el.style.width = W + "px";
    el.style.height = H + "px";
    var ctx = el.getContext("2d");
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    var padL = 48, padR = 80, padT = 18, padB = 44;
    var cW = W - padL - padR;
    var cH = H - padT - padB;

    // Find y range
    var yMin = 1, yMax = 0;
    for (var i = 0; i < points.length; i++) {
      yMin = Math.min(yMin, points[i].pure, points[i].div);
      yMax = Math.max(yMax, points[i].pure, points[i].div);
    }
    var yPad = (yMax - yMin) * 0.18;
    yMin = Math.max(0, yMin - yPad);
    yMax = Math.min(1, yMax + yPad);

    function xPos(accuracy) { return padL + (accuracy - ACC_MIN) / (ACC_MAX - ACC_MIN) * cW; }
    function yPos(val) { return padT + (1 - (val - yMin) / (yMax - yMin)) * cH; }

    // Grid lines
    ctx.strokeStyle = "rgba(0,0,0,0.06)";
    ctx.lineWidth = 0.5;
    for (var g = 0; g <= 4; g++) {
      var gv = yMin + (yMax - yMin) * g / 4;
      var gy = yPos(gv);
      ctx.beginPath(); ctx.moveTo(padL, gy); ctx.lineTo(padL + cW, gy); ctx.stroke();
      ctx.fillStyle = "#aaa";
      ctx.font = "9px DM Mono, monospace";
      ctx.textAlign = "right";
      ctx.fillText((gv * 100).toFixed(0) + "%", padL - 6, gy + 3);
    }

    // Shade gap between lines — green where div wins, red where pure wins
    for (var i = 0; i < points.length - 1; i++) {
      var x1 = xPos(points[i].accuracy), x2 = xPos(points[i+1].accuracy);
      var d1 = yPos(points[i].div), d2 = yPos(points[i+1].div);
      var p1 = yPos(points[i].pure), p2 = yPos(points[i+1].pure);
      var divWins = points[i].div > points[i].pure;
      ctx.fillStyle = divWins ? "rgba(39,174,96,0.10)" : "rgba(192,57,43,0.07)";
      ctx.beginPath();
      ctx.moveTo(x1, d1); ctx.lineTo(x2, d2);
      ctx.lineTo(x2, p2); ctx.lineTo(x1, p1);
      ctx.closePath();
      ctx.fill();
    }

    // Label the max diversity advantage
    ctx.font = "13px Caveat, cursive";
    ctx.textAlign = "center";
    var maxGap = 0, maxGapIdx = 0;
    for (var i = 0; i < points.length; i++) {
      var gap = points[i].div - points[i].pure;
      if (gap > maxGap) { maxGap = gap; maxGapIdx = i; }
    }
    if (maxGap > 0.01) {
      var labelX = xPos(points[maxGapIdx].accuracy);
      var labelY = (yPos(points[maxGapIdx].div) + yPos(points[maxGapIdx].pure)) / 2;
      ctx.fillStyle = "rgba(39,174,96,0.6)";
      ctx.fillText("diversity", labelX, labelY - 5);
      ctx.fillText("advantage", labelX, labelY + 9);
    }

    // Pure filter line
    ctx.strokeStyle = "rgba(0,0,0,0.45)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (var i = 0; i < points.length; i++) {
      var px = xPos(points[i].accuracy);
      var py = yPos(points[i].pure);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Diversity line
    ctx.strokeStyle = "#27ae60";
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (var i = 0; i < points.length; i++) {
      var px = xPos(points[i].accuracy);
      var py = yPos(points[i].div);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Direct line labels on right
    var lastPure = points[points.length - 1];
    var lastDiv = points[points.length - 1];
    var pureY = yPos(lastPure.pure);
    var divY = yPos(lastDiv.div);
    // Ensure they don't overlap
    if (Math.abs(pureY - divY) < 16) {
      pureY = (pureY + divY) / 2 - 9;
      divY = pureY + 18;
    }

    ctx.font = "12px Inter, sans-serif";
    ctx.textAlign = "left";
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillText("pure filter", padL + cW + 8, pureY + 4);
    ctx.fillStyle = "#27ae60";
    ctx.fillText("filter +", padL + cW + 8, divY - 2);
    ctx.fillText("diversity", padL + cW + 8, divY + 11);

    // X axis label
    ctx.fillStyle = "#888";
    ctx.font = "10px Inter, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("\u2190 inversely correlated          filter accuracy          correlated \u2192", padL + cW / 2, H - 4);
    // X axis ticks
    var tickVals = [-0.3, -0.15, 0, 0.25, 0.5, 0.75, 1.0];
    for (var ti = 0; ti < tickVals.length; ti++) {
      var xv = tickVals[ti];
      ctx.fillStyle = xv < 0 ? "#c0392b" : "#aaa";

// Methodology visualization: shows across-group vs within-group sorting
function MethodViz(props) {
  var splitAnim = props.splitAnim; // 0 = across-group, 1 = within-group (split)
  var rate = props.rate;
  var ref = useRef(null);

  // Sort by proxy (Pattern-Match World)
  var byProxy = POOL.slice().sort(function(a, b) { return b.proxy - a.proxy; });
  var byTruth = POOL.slice().sort(function(a, b) { return b.talent - a.talent; });
  var nSel = Math.floor(N * rate);

  // Across-group: top nSel by proxy
  var acrossIds = new Set();
  for (var i = 0; i < nSel; i++) acrossIds.add(byProxy[i].id);

  // Within-group: proportional
  var pat = POOL.filter(function(c) { return c.group === "pattern"; });
  var rest = POOL.filter(function(c) { return c.group === "rest"; });
  var patByProxy = pat.slice().sort(function(a, b) { return b.proxy - a.proxy; });
  var restByProxy = rest.slice().sort(function(a, b) { return b.proxy - a.proxy; });
  var nPat = Math.round(nSel * pat.length / N);
  var nRest = nSel - nPat;
  var withinIds = new Set();
  for (var i = 0; i < nPat; i++) withinIds.add(patByProxy[i].id);
  for (var i = 0; i < nRest; i++) withinIds.add(restByProxy[i].id);

  // True top talent for red X detection
  var trueTopIds = new Set();
  for (var i = 0; i < nSel; i++) trueTopIds.add(byTruth[i].id);

  // Position maps
  // Across: single 10-col grid sorted by proxy
  var acrossOrder = {};
  for (var i = 0; i < byProxy.length; i++) acrossOrder[byProxy[i].id] = i;

  // Within: pattern on left (3 cols), non-trad on right (7 cols)
  var patCols = 3, restCols = 7;
  var withinPos = {};
  for (var i = 0; i < patByProxy.length; i++) {
    var col = i % patCols;
    var row = Math.floor(i / patCols);
    withinPos[patByProxy[i].id] = { col: col, row: row };
  }
  for (var i = 0; i < restByProxy.length; i++) {
    var col = patCols + (i % restCols);
    var row = Math.floor(i / restCols);
    withinPos[restByProxy[i].id] = { col: col, row: row };
  }

  useEffect(function() {
    var el = ref.current;
    if (!el) return;
    var dpr = window.devicePixelRatio || 1;
    var parentW = el.parentElement ? el.parentElement.offsetWidth : 640;
    var W = Math.min(960, Math.max(400, parentW));
    var H = Math.round(W * 0.56);
    el.width = W * dpr;
    el.height = H * dpr;
    el.style.width = W + "px";
    el.style.height = H + "px";
    var ctx = el.getContext("2d");
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    var cols = 10;
    var pad = 12;
    var gapX = (W - pad * 2 - 20) / cols; // 20px for split gap
    var gapY = gapX * 0.95;
    var dotR = gapX * 0.34;
    var offY = 30;

    var ease = splitAnim < 1 ? (splitAnim * splitAnim * (3 - 2 * splitAnim)) : 1;

    // Cutoff lines
    // Across: single line after nSel items
    var acrossCutRow = Math.ceil(nSel / cols);
    var acrossLineY = offY + acrossCutRow * gapY + 1;

    // Within: two separate cutoffs
    var patCutRow = Math.ceil(nPat / patCols);
    var restCutRow = Math.ceil(nRest / restCols);
    var withinPatLineY = offY + patCutRow * gapY + 1;
    var withinRestLineY = offY + restCutRow * gapY + 1;

    // Draw split divider line when split
    if (ease > 0.1) {
      var divX = pad + patCols * gapX + 8;
      ctx.globalAlpha = ease * 0.3;
      ctx.strokeStyle = "#2a2a2a";
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(divX, offY - 5);
      ctx.lineTo(divX, H - 10);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;

      // Group labels
      ctx.globalAlpha = ease;
      ctx.font = "13px Caveat, cursive";
      ctx.fillStyle = "#2874a6";
      ctx.textAlign = "center";
      ctx.fillText("pattern (" + pat.length + ")", pad + patCols * gapX / 2, offY - 10);
      ctx.fillStyle = "#555";
      ctx.fillText("non-traditional (" + rest.length + ")", pad + patCols * gapX + 16 + restCols * gapX / 2, offY - 10);
      ctx.globalAlpha = 1;
    }

    // Across-group cutoff (fades out as split)
    if (ease < 0.9) {
      ctx.globalAlpha = 1 - ease;
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.lineWidth = 1.2;
      sketchLine(ctx, pad, acrossLineY, W - pad, acrossLineY);
      ctx.stroke();
      ctx.fillStyle = "#888";
      ctx.font = "11px Caveat, cursive";
      ctx.textAlign = "right";
      ctx.fillText("top " + nSel + " by proxy score \u2191", W - pad, acrossLineY + 13);
      ctx.globalAlpha = 1;
    }

    // Within-group cutoffs (fade in with split)
    if (ease > 0.1) {
      ctx.globalAlpha = ease;
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.lineWidth = 1.2;
      // Pattern cutoff
      sketchLine(ctx, pad - 2, withinPatLineY, pad + patCols * gapX + 2, withinPatLineY);
      ctx.stroke();
      ctx.fillStyle = "#888";
      ctx.font = "10px Caveat, cursive";
      ctx.textAlign = "left";
      ctx.fillText("top " + nPat, pad, withinPatLineY + 12);
      // Rest cutoff
      ctx.beginPath();
      sketchLine(ctx, pad + patCols * gapX + 14, withinRestLineY, W - pad + 2, withinRestLineY);
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.stroke();
      ctx.textAlign = "left";
      ctx.fillText("top " + nRest, pad + patCols * gapX + 16, withinRestLineY + 12);
      ctx.globalAlpha = 1;
    }

    // Draw each candidate
    for (var i = 0; i < POOL.length; i++) {
      var c = POOL[i];

      // Across position
      var aIdx = acrossOrder[c.id];
      var aCol = aIdx % cols;
      var aRow = Math.floor(aIdx / cols);
      var aX = pad + aCol * gapX + gapX / 2;
      var aY = offY + aRow * gapY + gapY / 2;

      // Within position
      var wPos = withinPos[c.id];
      var splitGap = wPos.col >= patCols ? 16 : 0;
      var wX = pad + wPos.col * gapX + gapX / 2 + splitGap;
      var wY = offY + wPos.row * gapY + gapY / 2;

      // Interpolate
      var cx = aX + (wX - aX) * ease + c.jx;
      var cy = aY + (wY - aY) * ease + c.jy;

      // Which selection set to use?
      var selSet = ease < 0.5 ? acrossIds : withinIds;
      var isSelected = selSet.has(c.id);
      var isTrulyTop = trueTopIds.has(c.id);
      var isMissed = isTrulyTop && !isSelected;

      // Draw
      if (isMissed) {
        sketchCircle(ctx, cx, cy, dotR, 0.12);
        if (c.group === "pattern") {
          ctx.strokeStyle = "rgba(40,116,166,0.4)";
        } else {
          ctx.strokeStyle = "rgba(42,42,42,0.25)";
        }
        ctx.lineWidth = 1.2;
        ctx.stroke();
        // Red X
        ctx.beginPath();
        sketchLine(ctx, cx - dotR * 0.45, cy - dotR * 0.45, cx + dotR * 0.45, cy + dotR * 0.45);
        ctx.strokeStyle = "#c0392b";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        sketchLine(ctx, cx + dotR * 0.45, cy - dotR * 0.45, cx - dotR * 0.45, cy + dotR * 0.45);
        ctx.stroke();
      } else if (c.group === "pattern") {
        sketchCircle(ctx, cx, cy, dotR, 0.12);
        if (isSelected) {
          ctx.fillStyle = "#2874a6";
          ctx.fill();
          ctx.strokeStyle = "#1a5276";
          ctx.lineWidth = 1;
          ctx.stroke();
        } else {
          ctx.strokeStyle = "rgba(40,116,166,0.4)";
          ctx.lineWidth = 1.3;
          ctx.stroke();
        }
        sketchCircle(ctx, cx, cy, dotR * 0.35, 0.15);
        ctx.fillStyle = "#f5f3ed";
        ctx.fill();
      } else {
        sketchCircle(ctx, cx, cy, dotR, 0.15);
        if (isSelected) {
          ctx.fillStyle = "rgba(42,42,42,0.85)";
          ctx.fill();
        } else {
          ctx.strokeStyle = "rgba(42,42,42,0.25)";
          ctx.lineWidth = 1.3;
          ctx.stroke();
        }
      }
    }

    // Labels at top when in across mode
    if (ease < 0.5) {
      ctx.globalAlpha = 1 - ease * 2;
      ctx.font = "11px Caveat, cursive";
      ctx.fillStyle = "#888";
      ctx.textAlign = "left";
      ctx.fillText("\u2190 highest proxy score", pad, offY - 10);
      ctx.globalAlpha = 1;
    }

  }, [splitAnim, rate]);

  return React.createElement("canvas", { ref: ref, style: { display: "block", maxWidth: "100%" } });
}

// Generic two-objective tradeoff scatter. 100 dots with random A and B.
// Slider blends between "optimize A" and "optimize B". Selected dots shift.
var PARETO_DOTS = (function() {
  var r = seededRand(77);
  var arr = [];
  for (var i = 0; i < 80; i++) {
    arr.push({ a: r(), b: r() });
  }
  return arr;
})();

function ParetoScatter(props) {
  var weight = props.weight; // 0 = optimize A, 1 = optimize B
  var ref = useRef(null);

  useEffect(function() {
    var el = ref.current;
    if (!el) return;
    var dpr = window.devicePixelRatio || 1;
    var W = 260, H = 260;
    el.width = W * dpr; el.height = H * dpr;
    el.style.width = W + "px"; el.style.height = H + "px";
    var ctx = el.getContext("2d");
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    var pad = 32, sz = W - pad * 2;

    // Axes
    ctx.strokeStyle = "rgba(0,0,0,0.15)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad, pad); ctx.lineTo(pad, pad + sz); ctx.lineTo(pad + sz, pad + sz);
    ctx.stroke();

    // Labels
    ctx.fillStyle = "#888";
    ctx.font = "12px Caveat, cursive";
    ctx.textAlign = "center";
    ctx.fillText("Objective A \u2192", pad + sz / 2, H - 6);
    ctx.save();
    ctx.translate(10, pad + sz / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText("Objective B \u2192", 0, 0);
    ctx.restore();

    // Score each dot by blended objective, select top 20
    var scored = PARETO_DOTS.map(function(d, i) {
      return { i: i, a: d.a, b: d.b, score: (1 - weight) * d.a + weight * d.b };
    });
    scored.sort(function(a, b) { return b.score - a.score; });
    var selSet = new Set();
    for (var i = 0; i < 20; i++) selSet.add(scored[i].i);

    // Compute avg A and B of selected
    var sumA = 0, sumB = 0;
    for (var i = 0; i < 20; i++) { sumA += scored[i].a; sumB += scored[i].b; }
    var avgA = sumA / 20, avgB = sumB / 20;

    // Draw dots
    for (var i = 0; i < PARETO_DOTS.length; i++) {
      var d = PARETO_DOTS[i];
      var cx = pad + d.a * sz;
      var cy = pad + sz - d.b * sz;
      var isSel = selSet.has(i);

      ctx.beginPath();
      ctx.arc(cx, cy, isSel ? 5.5 : 3, 0, Math.PI * 2);
      if (isSel) {
        ctx.fillStyle = "#2874a6";
        ctx.fill();
      } else {
        ctx.fillStyle = "rgba(0,0,0,0.08)";
        ctx.fill();
      }
    }

    // Crosshair at avg of selected
    ctx.setLineDash([3, 3]);
    ctx.strokeStyle = "rgba(40,116,166,0.4)";
    ctx.lineWidth = 1;
    var ax = pad + avgA * sz, ay = pad + sz - avgB * sz;
    ctx.beginPath(); ctx.moveTo(ax, pad); ctx.lineTo(ax, pad + sz); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad, ay); ctx.lineTo(pad + sz, ay); ctx.stroke();
    ctx.setLineDash([]);

    // Avg label
    ctx.fillStyle = "#2874a6";
    ctx.font = "11px DM Mono, monospace";
    ctx.textAlign = "left";
    ctx.fillText("A=" + (avgA * 100).toFixed(0) + "%", ax + 4, pad + sz - 4);
    ctx.textAlign = "right";
    ctx.fillText("B=" + (avgB * 100).toFixed(0) + "%", pad + sz, ay - 4);

  }, [weight]);

  return React.createElement("canvas", { ref: ref, style: { display: "block" } });
}

function computeStats(selected, truth, rate) {
  var selArr = POOL.filter(function(c) { return selected.has(c.id); });
  var avgTalent = selArr.length
    ? selArr.reduce(function(s, c) { return s + c[truth]; }, 0) / selArr.length
    : 0;
  var missed = topMissed(selected, POOL, truth, rate);
  var nTop = Math.floor(POOL.length * rate);
  var topFound = nTop - missed.length;
  var patInSel = selArr.filter(function(c) { return c.group === "pattern"; }).length;
  var patTotal = POOL.filter(function(c) { return c.group === "pattern"; }).length;
  var restTotal = POOL.length - patTotal;
  var restInSel = selArr.length - patInSel;
  return {
    avgTalent: avgTalent,
    missed: missed.length,
    topFound: topFound,
    topN: nTop,
    patShare: selArr.length ? patInSel / selArr.length : 0,
    n: selArr.length,
    patInSel: patInSel,
    patNotSel: patTotal - patInSel,
    patTotal: patTotal,
    restInSel: restInSel,
    restNotSel: restTotal - restInSel,
    restTotal: restTotal,
  };
}

        <div>
          <BreakevenChart points={breakevenData} />
        </div>
      </div>

      {/* Scroll indicator */}
      <div style={{ textAlign: "center", marginBottom: 16, marginTop: 8, padding: "12px 0" }}>
        <div style={{ fontSize: 14, color: "#999", fontFamily: hand, marginBottom: 4 }}>{"Scroll down to explore the simulation"}</div>
        <div style={{ fontSize: 24, color: "#bbb", animation: "bounce 2s infinite" }}>{"\u25bc"}</div>
      </div>

      {/* Apply filter button */}
      <div ref={filterBtnRef} style={{ marginBottom: 24 }}>
        <button onClick={applyFilter}
          style={{
            fontFamily: hand, fontSize: 22, fontWeight: 600,
            padding: "10px 32px", borderRadius: 6,
            border: "2px solid #2a2a2a",
            background: filtered ? "#eee" : "#2a2a2a",
            color: filtered ? "#2a2a2a" : "#f5f3ed",
            cursor: "pointer",
            transition: "all 0.2s",
          }}>
          {filtered ? "Reset \u21ba" : "Apply Filter \u2192"}
        </button>
        {!filtered ? (
          <span style={{ marginLeft: 14, fontSize: 13, color: "#999", fontStyle: "italic" }}>
            {"100 candidates, shuffled. Click to sort by true talent and apply each world\u2019s filter."}
          </span>
        ) : null}
      </div>

      {/* Sliders — only active when filtered */}
      <div style={{ opacity: filtered ? 1 : 0.3, pointerEvents: filtered ? "auto" : "none", transition: "opacity 0.4s" }}>
        <div style={{ marginBottom: 10, maxWidth: 500 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2 }}>
            <div style={{ fontSize: 20, fontWeight: 600, fontFamily: hand }}>{"Diversity factor"}</div>
            <div style={{ fontFamily: mono, fontSize: 20, fontWeight: 500 }}>
              {Math.round(divWeight * 100) + "%"}
            </div>
          </div>
          <div style={{ fontSize: 12, color: "#777", marginBottom: 6, lineHeight: 1.5 }}>
            {divWeight < 0.02
              ? "Pure filter \u2014 rank all candidates by filter score, take the top scorers. But how good is that score?"
              : divWeight > 0.98
              ? "Fully proportional \u2014 each group gets seats matching their share of the applicant pool (~22% pattern, ~78% non-trad). Best within each group by the same filter."
              : "Blended \u2014 each group is guaranteed at least " + Math.round(divWeight * 100) + "% of their proportional seats. Rest filled by top filter scorers."}
          </div>
          <input type="range" min="0" max="1" step="0.02" value={divWeight}
            onChange={function(e) { setDiv(+e.target.value); }}
            style={{ width: "100%", accentColor: "#2a2a2a" }} />
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#aaa", fontFamily: mono, marginTop: 3 }}>
            <span>{"0% \u2014 pure filter score"}</span>
            <span>{"100% \u2014 proportional to pool"}</span>
          </div>
        </div>
        <div style={{ marginBottom: 32, maxWidth: 500 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
            <div style={{ fontSize: 15, fontFamily: hand, color: "#666" }}>{"How selective?"}</div>
            <div style={{ fontFamily: mono, fontSize: 14, color: "#666" }}>
              {"top " + Math.round(rate * 100) + "% (" + Math.floor(POOL.length * rate) + " of " + POOL.length + ")"}
            </div>
          </div>
          <input type="range" min="0.08" max="0.5" step="0.01" value={rate}
            onChange={function(e) { setRate(+e.target.value); }}
            style={{ width: "100%", accentColor: "#aaa" }} />
        </div>
      </div>

      {/* Small multiples — CSS grid for alignment */}
      {/* Row 1: titles + talent scores */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 28 }}>
        {allData.map(function(d) {
          var w = d.world;
          var s = d.stats;
          var delta = d.delta;
          var deltaColor = delta > 0.005 ? "#27ae60" : delta < -0.005 ? "#c0392b" : "#999";
          var deltaSign = delta > 0.005 ? "+" : "";
          return (
            <div key={w.id + "-hdr"}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <div style={{ fontSize: 20, fontWeight: 600, fontFamily: hand }}>{w.name}</div>
                {filtered ? (
                  <div style={{ fontFamily: mono, fontSize: 22, fontWeight: 700, color: "#2a2a2a" }}>
                    {(s.avgTalent * 100).toFixed(1) + "%"}
                  </div>
                ) : null}
              </div>
              {filtered && divWeight > 0.02 ? (
                <div style={{ textAlign: "right", fontFamily: mono, fontSize: 12, fontWeight: 600, color: deltaColor, marginTop: -2 }}>
                  {deltaSign + (delta * 100).toFixed(1) + "% vs. no diversity"}
                </div>
              ) : null}
            </div>
          );
        })}
      </div>
      {/* Row 2: subtitles (fixed height) */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 28, marginTop: 4, marginBottom: 6 }}>
        {allData.map(function(d) {
          return (
            <div key={d.world.id + "-sub"} style={{ fontSize: 11.5, color: "#666", lineHeight: 1.55, paddingBottom: 6, borderBottom: "2px solid #2a2a2a" }}>
              {d.world.subtitle}
            </div>
          );
        })}
      </div>
      {/* Row 3: grids (aligned) */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 28 }}>
        {allData.map(function(d) {
          var w = d.world;
          var s = d.stats;
          var delta = d.delta;
          var deltaColor = delta > 0.005 ? "#27ae60" : delta < -0.005 ? "#c0392b" : "#999";
          var deltaSign = delta > 0.005 ? "+" : "";

          return (
            <div key={w.id}>
              <TalentGrid selected={d.selected} truthField={w.truth} width={300} rate={rate} filterAnim={filterAnim} />

              {/* Method annotation + stats below grid */}
              {filtered ? (
                <div style={{ marginTop: 6 }}>
                  <div style={{ fontSize: 11, color: divWeight > 0.02 ? "#27ae60" : "#888", fontFamily: mono, marginBottom: 4, lineHeight: 1.5 }}>
                    {divWeight > 0.02
                      ? "\u2192 same proxy, ranked within each group"
                      : "\u2192 ranked by proxy across all candidates"}
                  </div>
                  <div style={{ fontSize: 12, color: "#555", lineHeight: 1.8 }}>
                    {s.missed > 0 ? (
                      <span>
                        <span style={{ color: "#c0392b", fontWeight: 600 }}>
                          {s.missed + " high-talent candidate" + (s.missed > 1 ? "s" : "") + " rejected"}
                        </span>
                        {" \u2014 would be in top " + Math.round(rate * 100) + "% by true talent."}
                      </span>
                    ) : (
                      <span style={{ color: "#27ae60" }}>{"No high talent missed."}</span>
                    )}
                  </div>
                  {/* Group breakdown */}
                  <div style={{ marginTop: 6, fontSize: 12, lineHeight: 1.9, color: "#555" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <svg width="14" height="14" viewBox="0 0 14 14" style={{ flexShrink: 0 }}>
                        <circle cx="7" cy="7" r="5.5" fill="#2874a6" />
                        <circle cx="7" cy="7" r="2" fill="#f5f3ed" />
                      </svg>
                      <span>
                        <strong>{s.patInSel}</strong>{" selected, "}
                        <span style={{ color: "#999" }}>{s.patNotSel + " not"}</span>
                        <span style={{ color: "#aaa" }}>{" (of " + s.patTotal + " pattern)"}</span>
                      </span>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <svg width="14" height="14" viewBox="0 0 14 14" style={{ flexShrink: 0 }}>
                        <circle cx="7" cy="7" r="5.5" fill="#2a2a2a" />
                      </svg>
                      <span>
                        <strong>{s.restInSel}</strong>{" selected, "}
                        <span style={{ color: "#999" }}>{s.restNotSel + " not"}</span>
                        <span style={{ color: "#aaa" }}>{" (of " + s.restTotal + " non-traditional)"}</span>
                      </span>
                    </div>
                  </div>
                </div>
              ) : null}
            </div>
          );
        })}
      </div>

      {/* Legend — near the visuals */}
      <div style={{ display: "flex", gap: 18, flexWrap: "wrap", marginTop: 20, padding: "12px 16px", background: "rgba(0,0,0,0.025)", borderRadius: 6, fontSize: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <svg width="18" height="18" viewBox="0 0 18 18">
            <circle cx="9" cy="9" r="7" fill="#2a2a2a" />
          </svg>
          <span>{"Selected \u2014 non-traditional"}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <svg width="18" height="18" viewBox="0 0 18 18">
            <circle cx="9" cy="9" r="7" fill="#2874a6" />
            <circle cx="9" cy="9" r="2.5" fill="#f5f3ed" />
          </svg>
          <span>{"Selected \u2014 the pattern (~22%)"}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <svg width="18" height="18" viewBox="0 0 18 18">
            <circle cx="9" cy="9" r="6" fill="none" stroke="#c0392b" strokeWidth="1.5" />
            <line x1="5.5" y1="5.5" x2="12.5" y2="12.5" stroke="#c0392b" strokeWidth="1.3" />
            <line x1="12.5" y1="5.5" x2="5.5" y2="12.5" stroke="#c0392b" strokeWidth="1.3" />
          </svg>
          <span style={{ color: "#c0392b" }}>{"High talent, rejected by filter"}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <svg width="18" height="18" viewBox="0 0 18 18">
            <circle cx="9" cy="9" r="6" fill="none" stroke="rgba(42,42,42,0.3)" strokeWidth="1.3" />
          </svg>
          <span style={{ color: "#999" }}>{"Not selected (hollow)"}</span>
        </div>
      </div>

      {/* Methodology — show don't tell */}
      <div style={{ marginTop: 44, borderTop: "2px solid #2a2a2a", paddingTop: 20 }}>
        <p style={{ fontSize: 22, fontFamily: hand, color: "#333", lineHeight: 1.4, marginBottom: 6 }}>
          {"How the diversity constraint actually works"}
        </p>
        <p style={{ fontSize: 14, color: "#555", lineHeight: 1.7, marginBottom: 6, maxWidth: 960 }}>
          {"A common objection: if you need a good filter to select diverse candidates, why not just use that filter for everyone? The answer: you do. The diversity constraint doesn\u2019t require a better filter. It uses the same evaluation \u2014 but removes the cross-group bias by comparing candidates against their own group instead of against everyone."}
        </p>
        <p style={{ fontSize: 14, color: "#555", lineHeight: 1.7, marginBottom: 16, maxWidth: 960 }}>
          {"The filter evaluates everyone with the same accuracy. The problem is the additive bonus: pattern candidates start with a higher baseline score just for looking the part. When you rank across groups, that bonus dominates. When you rank within groups, the bonus is the same for everyone in the group \u2014 it cancels out, and the ranking becomes about real signal. Click below to watch:"}
        </p>

        <div style={{ marginBottom: 12 }}>
          <button onClick={toggleSplit}
            style={{
              fontFamily: hand, fontSize: 18, fontWeight: 600,
              padding: "8px 24px", borderRadius: 6,
              border: "2px solid #2a2a2a",
              background: splitMode ? "#27ae60" : "#2a2a2a",
              color: "#f5f3ed",
              cursor: "pointer",
              transition: "all 0.2s",
            }}>
            {splitMode ? "\u2190 Rank across groups" : "Split into groups \u2192"}
          </button>
          <span style={{ marginLeft: 14, fontSize: 13, color: "#888" }}>
            {splitMode
              ? "Same proxy, ranked within each group. Bias cancels out within groups."
              : "All 100 ranked by proxy score. Pattern bonus pushes them to the top."}
          </span>
        </div>

        <MethodViz splitAnim={splitAnim} rate={rate} />

        <div style={{ marginTop: 16, maxWidth: 960 }}>
          <p style={{ fontSize: 14, color: "#444", lineHeight: 1.8 }}>
            <strong>{"The tradeoff is real."}</strong>
            {" People do cluster into high-performing groups \u2014 Ivy graduates, ex-FAANG, YC alumni. These groups have been pre-filtered, so they likely have a genuine talent edge. A diversity constraint that forces proportional representation will, by definition, exclude some qualified pattern candidates in favor of non-traditional ones with lower expected value."}
          </p>
          <p style={{ fontSize: 14, color: "#444", lineHeight: 1.8, marginTop: 10 }}>
            <strong>{"But the filter overstates the difference."}</strong>
            {" The question is whether your filter\u2019s bias exceeds the real talent gap. If the pattern group is genuinely +6% better but your filter gives them a +40% bonus for legibility, you\u2019re wasting most of your selection on pattern-matching rather than talent-finding. Within-group ranking strips the bonus and lets the real signal \u2014 however noisy \u2014 drive the selection. For pattern candidates, the filter reads them well. For non-traditional candidates, it\u2019s weaker but not zero: traction, technical demos, domain expertise still provide signal."}
          </p>
          <p style={{ fontSize: 14, color: "#444", lineHeight: 1.8, marginTop: 10 }}>
            {"There\u2019s a second-order effect too: a diversity requirement forces evaluators to rethink their criteria. When you "}
            <em>{"must"}</em>
            {" fill seats from a broader pool, you can\u2019t fall back on pattern-matching shortcuts. You develop more creative, more accurate evaluation methods \u2014 structured interviews, work samples, blind assessments. The constraint doesn\u2019t just correct for bias in the current filter. It creates pressure to build a better one."}
          </p>
          <p style={{ fontSize: 14, color: "#444", lineHeight: 1.8, marginTop: 14 }}>
            {"Graham\u2019s principle"}
            <sup><a href="https://paulgraham.com/woke.html" target="_blank" rel="noopener" style={{ color: "#2874a6", textDecoration: "none" }}>{"1"}</a></sup>
            {" is mathematically correct: you cannot simultaneously maximize two non-identical objectives. The question is whether the objective your filter is maximizing \u2014 proxy score \u2014 is close enough to the objective you care about \u2014 actual talent. Use the sliders above to decide for yourself."}
          </p>
        </div>
      </div>

      {/* Footnotes */}
      <div style={{ marginTop: 48, borderTop: "1px solid #ddd", paddingTop: 12 }}>
        <p style={{ fontSize: 11, color: "#999", lineHeight: 1.6 }}>
          <sup>{"1"}</sup>{" Paul Graham, "}
          <a href="https://paulgraham.com/woke.html" target="_blank" rel="noopener" style={{ color: "#999" }}>
            <em>{"The Origins of Wokeness"}</em>
          </a>
          {". See especially footnote 6: \u201cYou can\u2019t simultaneously maximize two different objective functions, unless they\u2019re identical.\u201d"}
        </p>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
